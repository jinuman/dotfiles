# 프롬프트 깔끔하게
add_newline = false

# 외부 명령 timeout — Swift cold start (xcrun 거쳐 1~3초) 흡수용
# 안 늘리면 `[WARN] Executing command "/usr/bin/swift" timed out` 보임
command_timeout = 2000

# -----------------------------------------------------------------------------
# 2-line prompt layout
#   Line 1: 디렉터리  git_branch  git_status  git_metrics  [cmd_duration]  ........  시계
#   Line 2: 언어 버전 (Node, Ruby, Swift, ...)
#   Line 3: ❯ (입력 커서)
#
# $fill 이 line 1 의 빈 공간을 spaces 로 채워서 시계가 터미널 우측 끝으로 정렬됨.
# cmd_duration 은 변수형 — 직전 명령이 빠르면 안 보이고, 느리면 line 1 우측 시계 직전에 표시.
# -----------------------------------------------------------------------------
format = """$directory$git_branch$git_status$git_metrics$cmd_duration$fill$time
$nodejs$ruby$swift$python
$character"""

# 사이 빈 공간 메우는 모듈 (우측 정렬 효과)
[fill]
symbol = " "

# 우측 시계 — 명령 실행 시간 추적 cue
[time]
disabled    = false
format      = "[$time]($style)"
time_format = "%H:%M:%S"
style       = "bold dimmed white"

# -----------------------------------------------------------------------------
# Git status — 변경 파일 / ahead-behind 개수 명시
# 기본은 `[!⇡]` 같은 단순 표시. 수치까지 보이면 push/commit 결정에 도움.
# 화면 예시: [!3+2⇡5]  → 수정 3개, staged 2개, 5 commit ahead
# -----------------------------------------------------------------------------
[git_status]
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted  = "=${count}"
deleted     = "✘${count}"
modified    = "!${count}"
staged      = "+${count}"
stashed     = "≡${count}"
untracked   = "?${count}"
renamed     = "»${count}"

# -----------------------------------------------------------------------------
# Command duration — 2초 이상 걸린 명령은 실행 시간 표시
# fastlane / xcodebuild / brew bundle 같이 오래 걸리는 작업 끝나면
# "took 1m23s" 식으로 보임 → 다음 명령 입력 전 시각적 cue
# -----------------------------------------------------------------------------
[cmd_duration]
min_time = 2000
format   = " took [$duration]($style) "
style    = "yellow bold"

# -----------------------------------------------------------------------------
# Git metrics — 이번 변경의 +추가 / -삭제 라인 수
# 너무 시끄러우면 disabled = true
# -----------------------------------------------------------------------------
[git_metrics]
disabled      = false
added_style   = "green"
deleted_style = "red"
format        = "([+$added]($added_style) )([-$deleted]($deleted_style) )"
